<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тризуби — Благодійні</title>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
</head>
<body>
  <svg style="display: none;" width="0" height="0">
    <defs>
      <filter id="liquid-glass" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" seed="2"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <aside class="sidebar-panel">
    <div class="sidebar-content">
      <div class="sidebar-logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text" data-ua="Тризуби" data-en="Tridents">Тризуби</span>
      </div>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="ua" title="Українська">UA</button>
        <button class="lang-btn" data-lang="en" title="English">EN</button>
      </div>
      <nav class="categories">
        <p class="categories-label" data-ua="Категорії" data-en="Categories">Категорії</p>
        <ul class="category-list" id="categoryList"></ul>
      </nav>
    </div>
  </aside>

  <main class="main-container">
    <button class="sidebar-toggle-mobile" id="sidebarToggleMobile" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
    <div class="swiper tridents-swiper">
      <div class="swiper-wrapper" id="tridentSlides"></div>
    </div>
    <div class="nav-controls">
      <button class="nav-btn nav-prev" aria-label="Попередній тризуб">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button class="nav-btn nav-next" aria-label="Наступний тризуб">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
    <div class="progress-indicator" id="progressIndicator"></div>
  </main>

  <script src="../data.js?v=folder-drive-1"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>window.__INITIAL_CATEGORY = 'charitable';</script>
  <script src="../catalog.js?v=folder-drive-1"></script>
</body>
</html>
