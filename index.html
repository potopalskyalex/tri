<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Збірка Тризубів України</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
</head>
<body>

  <!-- ══════════ ШАПКА ══════════ -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">&#x2737; Тризуби України</span>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="ua">UA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <!-- ══════════ ОСНОВНИЙ LAYOUT ══════════ -->
  <div class="app-layout">

    <!-- БІЧНЕ МЕНЮ -->
    <nav class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Меню">&#9776;</button>

      <div class="sidebar-inner">
        <p class="sidebar-label" data-ua="Категорії" data-en="Categories">Категорії</p>

        <!-- Категорії генеруються з JS -->
        <ul class="category-list" id="categoryList"></ul>
      </div>
    </nav>

    <!-- КАТАЛОГ -->
    <main class="catalog" id="catalog">
      <div class="catalog-header">
        <h1 class="catalog-title" id="catalogTitle" data-ua="Всі тризуби" data-en="All tridents">Всі тризуби</h1>
        <p class="catalog-count" id="catalogCount"></p>
      </div>

      <!-- Картки тризубів -->
      <div class="grid" id="grid"></div>
    </main>

  </div>

  <!-- ══════════ СКРИПТИ ══════════ -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="catalog.js"></script>

</body>
</html>
