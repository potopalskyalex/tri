<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Збірка Тризубів України</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
</head>
<body>

  <!-- ══════════ ЛЕВА ПАНЕЛЬ (FROSTED GLASS) ══════════ -->
  <aside class="sidebar-panel">
    <div class="sidebar-content">
      <!-- Логотип -->
      <div class="sidebar-logo">
        <span class="logo-icon">&#x2737;</span>
        <span class="logo-text" data-ua="Тризуби" data-en="Tridents">Тризуби</span>
      </div>

      <!-- Мовне перемикання -->
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="ua" title="Українська">UA</button>
        <button class="lang-btn" data-lang="en" title="English">EN</button>
      </div>

      <!-- Категорії -->
      <nav class="categories">
        <p class="categories-label" data-ua="Категорії" data-en="Categories">Категорії</p>
        <ul class="category-list" id="categoryList"></ul>
      </nav>
    </div>
  </aside>

  <!-- ══════════ ОСНОВНА ОБЛАСТЬ ══════════ -->
  <main class="main-container">
    
    <!-- МОБІЛЬНА КНОПКА TOGGLE -->
    <button class="sidebar-toggle-mobile" id="sidebarToggleMobile" aria-label="Меню">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- ГОРИЗОНТАЛЬНИЙ СВАЙПЕР ДЛЯ ТРИЗУБІВ -->
    <div class="swiper tridents-swiper">
      <div class="swiper-wrapper" id="tridentSlides">
        <!-- Слайди тризубів генеруються з JS -->
      </div>
    </div>

    <!-- НАВІГАЦІЙНІ КНОПКИ -->
    <div class="nav-controls">
      <button class="nav-btn nav-prev" aria-label="Попередній тризуб">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button class="nav-btn nav-next" aria-label="Наступний тризуб">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- ІНДИКАТОР ПРОГРЕСУ (ТРИКУТНИЧКА) -->
    <div class="progress-indicator" id="progressIndicator"></div>
  </main>

  <!-- ══════════ СКРИПТИ ══════════ -->
  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="catalog.js"></script>

</body>
</html>
